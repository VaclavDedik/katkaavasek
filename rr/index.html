<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katka &amp; Vašek</title>
  <link rel="icon" href="../img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --rainbow-1: #ff9aa2;
      --rainbow-2: #ffcc99;
      --rainbow-3: #ffeaa7;
      --rainbow-4: #a8e6cf;
      --rainbow-5: #a0c4ff;
      --rainbow-6: #c3a8e1;
    }

    html, body {
      height: 100%;
      font-family: 'Cormorant Garamond', 'Georgia', serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        120deg,
        var(--rainbow-1),
        var(--rainbow-2),
        var(--rainbow-3),
        var(--rainbow-4),
        var(--rainbow-5),
        var(--rainbow-6)
      );
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 56rem;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="video-wrapper">
      <iframe
        src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=1"
        title="YouTube video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>
  </div>

</body>
</html>
